# Pull request validation for Windows against the `dev` and `master` branches
# See https://docs.microsoft.com/en-us/azure/devops/pipelines/yaml-schema for reference
trigger:
  branches:
    include:
      - dev
      - v1.*
      - master
      - feature/*

pr:
  autoCancel: true # indicates whether additional pushes to a PR should cancel in-progress runs for the same PR. Defaults to true
  branches:
    include: [dev, v1.*, master, feature/*] # branch names which will trigger a build

name: $(Year:yyyy).$(Month).$(DayOfMonth)$(Rev:.r)

jobs:
  - job: DocsSpellcheck
    displayName: "Docs: Spellcheck"
    pool:
      vmImage: ubuntu-latest
    steps:
      - checkout: self # self represents the repo where the initial Pipelines YAML file was found
        clean: false # whether to fetch clean each time
        submodules: recursive # set to 'true' for a single level of submodules or 'recursive' to get submodules of submodules
      - task: NodeTool@0
        inputs:
          versionSpec: "16.x"
      - task: Npm@1
        inputs:
          command: "custom"
          customCommand: "install -g cspell@6.12.0"
      - task: CmdLine@2
        inputs:
          script: 'cspell --config ./docs/cSpell.json "docs/**/*.md"'

  - job: DocsMarkdownLinting
    displayName: "Docs: Markdown Linting"
    pool:
      vmImage: ubuntu-latest
    steps:
      - checkout: self # self represents the repo where the initial Pipelines YAML file was found
        clean: false # whether to fetch clean each time
        submodules: recursive # set to 'true' for a single level of submodules or 'recursive' to get submodules of submodules
      - task: NodeTool@0
        inputs:
          versionSpec: "12.x"
      - task: Npm@1
        inputs:
          command: "custom"
          customCommand: "install -g markdownlint-cli@0.31.0 markdownlint-rule-titlecase@0.1.0"
      - task: CmdLine@2
        inputs:
          script: 'markdownlint "docs/**/*.md" --rules "markdownlint-rule-titlecase"'

  - job: SlopwatchAnalysis
    displayName: "Slopwatch: LLM Code Quality Check"
    pool:
      vmImage: ubuntu-latest
    steps:
      - checkout: self
        clean: false
        submodules: recursive
      - task: UseDotNet@2
        displayName: 'Use .NET'
        inputs:
          packageType: 'sdk'
          useGlobalJson: true
      - script: dotnet tool restore
        displayName: 'Restore .NET Tools'
      - script: dotnet slopwatch analyze -d . --fail-on error --stats
        displayName: 'Run Slopwatch Analysis'

  - template: azure-pipeline.template.yaml
    parameters:
      name: "docfx_test"
      displayName: "DocFX warning check"
      vmImage: "windows-latest"
      command: |
        dotnet docfx metadata ./docs/docfx.json --warningsAsErrors
        dotnet docfx build ./docs/docfx.json --warningsAsErrors
      outputDirectory: "TestResults"
      artifactName: "docfx_test-$(Build.BuildId)"
      run_if: eq(variables['Build.Reason'], 'PullRequest')
      
  - template: azure-pipeline.template.yaml
    parameters:
      name: "net_tests_windows"
      displayName: ".NET Unit Tests (Windows)"
      vmImage: "windows-latest"
      command: "dotnet incrementalist run --config .incrementalist/testsOnly.json --branch $(IncrementalistBaseBranch) -- test -c Release --no-build --framework net10.0 --logger:trx --results-directory TestResults"
      outputDirectory: "TestResults"
      artifactName: "net_tests_windows-$(Build.BuildId)"

  - template: azure-pipeline.template.yaml
    parameters:
      name: "net_tests_linux"
      displayName: ".NET Unit Tests (Linux)"
      vmImage: "ubuntu-latest"
      command: "dotnet incrementalist run --config .incrementalist/testsOnly.json --branch $(IncrementalistBaseBranch) -- test -c Release --no-build --framework net10.0 --logger:trx --results-directory TestResults"
      outputDirectory: "TestResults"
      artifactName: "net_tests_linux-$(Build.BuildId)"

  - template: azure-pipeline.mntr-template.yaml
    parameters:
      name: "net_mntr_windows"
      displayName: ".NET Multi-Node Tests (Windows)"
      vmImage: "windows-latest"
      command: "dotnet incrementalist run --config .incrementalist/mutliNodeOnly.json --branch $(IncrementalistBaseBranch) -- test -c Release --no-build --framework net10.0 --logger:trx --results-directory TestResults/multinode"
      outputDirectory: "TestResults"
      artifactName: "net_mntr_windows-$(Build.BuildId)"
      mntrFailuresDir: 'TestResults\\multinode'
      mntrFailuresArtifactName: "net_7_mntr_FAILED_windows-$(Build.BuildId)"

  - template: azure-pipeline.template.yaml
    parameters:
      name: "nuget_pack"
      displayName: "NuGet Pack"
      vmImage: "windows-latest"
      command: "dotnet pack -c Release -o bin/nuget"
      outputDirectory: "bin/nuget"
      artifactName: "nuget_pack-$(Build.BuildId)"
