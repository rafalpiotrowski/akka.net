parameters:
  name: ''
  displayName: ''
  vmImage: ''
  dependsOn: 'WindowsBuild'
  artifactName: 'akkaBuild'
  command: ''
  outputDirectory: ''
  timeoutInMinutes: 120

jobs:
  - job: ${{ parameters.name }}
    displayName: ${{ parameters.displayName }}
    timeoutInMinutes: ${{ parameters.timeoutInMinutes }}
    pool:
      vmImage: ${{ parameters.vmImage }}
    steps:
      - task: UseDotNet@2
        displayName: 'Use .NET'
        inputs:
          packageType: 'sdk'
          useGlobalJson: true
          installationPath: '$(Agent.TempDirectory)/dotnet'
          performMultiLevelLookup: false
      
      # Set the Incrementalist base branch based on PR target branch
      - pwsh: |
          if ('$(Build.Reason)' -eq 'PullRequest') {
            # Extract branch name from refs/heads/branch format
            $targetBranch = '$(System.PullRequest.TargetBranch)'.Replace('refs/heads/', '')
            Write-Host "PR detected - using base branch: $targetBranch"
            Write-Host "##vso[task.setvariable variable=IncrementalistBaseBranch]$targetBranch"
          } else {
            Write-Host "Not a PR - using default base branch: dev"
            Write-Host "##vso[task.setvariable variable=IncrementalistBaseBranch]dev"
          }
        displayName: 'Set Incrementalist base branch'

      - script: dotnet tool restore
        displayName: 'Restore dotnet tools'

      - pwsh: |
          . ./scripts/Create-DirectoryTree.ps1 # Source the script
          Ensure-DirectoryPath -Path "${{ parameters.outputDirectory }}/multinode/FAILED_SPECS_LOGS"
          Ensure-DirectoryPath -Path "bin/output"
        displayName: 'Ensure output directories'

      - script: dotnet build -c Release
        displayName: "Compile"
        continueOnError: false

      - script: ${{ parameters.command }}
        continueOnError: true

      - task: PublishTestResults@2
        inputs:
          testRunner: VSTest
          testResultsFiles: '**/*.trx' #TestResults folder usually
          testRunTitle: ${{ parameters.name }}
          mergeTestResults: true
      - task: CopyFiles@2
        displayName: 'Copy Build Output'
        inputs:
          sourceFolder: ${{ parameters.outputDirectory }}
          contents: '**\*'
          targetFolder: $(Build.ArtifactStagingDirectory)
          continueOnError: boolean  # 'true' if future steps should run even if this step fails; defaults to 'false'
      - task: PublishBuildArtifacts@1
        inputs:
          pathtoPublish: '$(Build.ArtifactStagingDirectory)'
          artifactName: ${{ parameters.artifactName }}
      - task: CopyFiles@2
        displayName: 'Copy MNTR Failure Logs'
        inputs:
          sourceFolder: ${{ parameters.mntrFailuresDir }}
          contents: '**/FAILED_SPECS_LOGS/*'
          cleanTargetFolder: true
          targetFolder: $(Build.ArtifactStagingDirectory)
          continueOnError: boolean  # 'true' if future steps should run even if this step fails; defaults to 'false'
      - task: PublishBuildArtifacts@1
        inputs:
          pathtoPublish: '$(Build.ArtifactStagingDirectory)'
          artifactName: ${{ parameters.mntrFailuresArtifactName }}
      - script: 'echo 1>&2'
        failOnStderr: true
        displayName: 'If above is partially succeeded, then fail'
        condition: eq(variables['Agent.JobStatus'], 'SucceededWithIssues')
